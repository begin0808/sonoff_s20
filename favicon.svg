<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Bright gradient background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Plug body (white capsule) -->
  <rect x="19" y="8" width="26" height="48" rx="13" fill="#ffffff"/>

  <!-- Socket holes -->
  <rect x="26" y="16" width="4" height="10" rx="2" fill="#3b82f6"/>
  <rect x="34" y="16" width="4" height="10" rx="2" fill="#3b82f6"/>

  <!-- Power button (green circle with icon) -->
  <circle cx="32" cy="42" r="8" fill="#10b981"/>
  <circle cx="32" cy="42" r="5" stroke="#ffffff" stroke-width="2" fill="none" stroke-dasharray="23 8" stroke-linecap="round" transform="rotate(-90 32 42)"/>
  <line x1="32" y1="37" x2="32" y2="41" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
</svg>
