<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e1a" />
      <stop offset="100%" stop-color="#151d3b" />
    </linearGradient>
    
    <!-- Body Gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2538" />
      <stop offset="100%" stop-color="#0f1322" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="8" />

  <!-- Outer ambient glow around S20 plug -->
  <rect x="156" y="70" width="200" height="372" rx="72" fill="none" stroke="#3b82f6" stroke-width="12" opacity="0.15" filter="url(#glowBlue)" />

  <!-- S20 Plug Body (capsule) -->
  <rect x="166" y="80" width="180" height="352" rx="64" fill="url(#bodyGrad)" stroke="#3b82f6" stroke-width="6" />

  <!-- Inner socket faceplate -->
  <rect x="186" y="104" width="140" height="140" rx="36" fill="#141829" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4" />

  <!-- Socket slots -->
  <!-- Ground hole -->
  <circle cx="256" cy="140" r="12" fill="#0b0e17" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
  <!-- Live and Neutral slots -->
  <rect x="212" y="166" width="16" height="36" rx="5" fill="#0b0e17" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
  <rect x="284" y="166" width="16" height="36" rx="5" fill="#0b0e17" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />

  <!-- Brand Text -->
  <text x="256" y="292" fill="#586782" font-family="'Outfit', sans-serif" font-size="15" font-weight="900" text-anchor="middle" letter-spacing="2">SONOFF</text>

  <!-- Power Button with LED Ring -->
  <g>
    <!-- LED Glow -->
    <circle cx="256" cy="356" r="28" fill="none" stroke="#10b981" stroke-width="6" filter="url(#glowGreen)" />
    <!-- Button base -->
    <circle cx="256" cy="356" r="20" fill="#1e2538" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
    <!-- Power Symbol -->
    <circle cx="256" cy="356" r="9" stroke="#ffffff" stroke-width="3" fill="none" stroke-dasharray="42 15" stroke-linecap="round" transform="rotate(-45 256 356)" />
    <line x1="256" y1="347" x2="256" y2="355" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
